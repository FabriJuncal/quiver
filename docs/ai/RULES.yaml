## planning

### Cuándo planificar (auto-trigger)

```yaml
auto_trigger_if:
  - files_to_change > 5
  - includes_architecture_decision: true
  - includes_db_migration: true
  - estimated_complexity > 7/10
  - first_time_doing_this_task: true

skip_if:
  - files_to_change <= 2
  - similar_task_done_before: true
  - user_explicitly_said: "no plan needed"
```

### Formato de plan

```yaml
# tasks/plan-YYYY-MM-DD-task-name.yaml
task: "Descripción de la tarea"
complexity: 5/10
estimated_time: 2-3h

steps:
  - id: 1
    description: "Paso 1"
    files: ["archivo1.ts"]
    estimated_time: 30m
    
  - id: 2
    description: "Paso 2"
    files: ["archivo2.ts"]
    depends_on: [1]
    estimated_time: 45m

verification:
  - "npm run build pasa sin errores"
  - "Tests E2E pasan"
```

