## commits

### Formato de mensaje

```
tipo(modulo): descripción [TICKET]

- Cambio 1
- Cambio 2

Refs: #TICKET
```

### Reglas de commit

```yaml
max_files_per_commit: 5
atomic_commits: true
no_wip_commits: false  # WIP commits OK en feature branches

commit_types:
  feat: Nueva funcionalidad
  fix: Corrección de bug
  refactor: Refactor sin cambio funcional
  test: Tests nuevos o modificados
  docs: Documentación
  chore: Tareas de mantenimiento
```

---

## documentation

### Cuándo actualizar documentación

```yaml
update_if:
  - api_endpoint_created: true
  - api_endpoint_changed: true
  - new_feature: true
  - behavior_changed: true
  - spec_changed: true
```

### Archivos a actualizar

```yaml
files:
  - "docs/api/*/README.md"
  - "docs/INDEX.md"
  - "specs/[spec]/slices/[slice-id]/slice.json"
  - "specs/[spec]/slices/[slice-id]/pr.md"
```

### Checklist de documentación por feature

```yaml
checklist:
  - "Endpoint documentado en docs/api/[modulo]/README.md"
  - "Spec actualizado en specs/[spec]/slices/[slice-id]/slice.json"
  - "INDEX.md actualizado (si hay nuevos archivos)"
  - "pr.md actualizado en el directorio del slice"
```

