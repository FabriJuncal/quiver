## review

### Pre-PR Checklist (automática)

```yaml
auto_check:
  tests_pass: true
  lint_pass: true
  type_check_pass: true
  no_console_log: true
  no_todo_comments: true
  no_debugger: true

manual_review_required_if:
  - files_changed > 10
  - includes_security_changes: true
  - includes_db_migrations: true
  - includes_api_changes: true
```

### Criterios de review

```yaml
review_criteria:
  - "¿Hay tests para cambios funcionales?"
  - "¿El código es legible sin comentarios?"
  - "¿Seguimos patrones existentes?"
  - "¿Hay efectos secundarios no obvios?"
  - "¿No hay secrets en el código?"
```

### Prompt de review (no confrontacional)

```
Revisá este cambio con los criterios del review checklist.

Si encontrás problemas, listalos con:
1. Archivo + línea
2. Problema específico
3. Solución sugerida

Implementá solo los fixes aprobados.
```

