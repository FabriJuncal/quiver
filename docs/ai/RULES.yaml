## subagents

### Cuándo usar subagentes

```yaml
use_if:
  - exploration_files > 20
  - parallel_searches > 3
  - independent_tasks > 2

max_concurrent: 5
timeout_per_agent: 5m
```

### Cuándo NO usar subagentes

```yaml
do_not_use_if:
  - files_to_explore <= 10
  - task_requires_coordination: true
  - context_window_is_clean: true
```

### Formato de delegación

```yaml
subagent:
  task: "Explorar estructura de componentes React"
  scope: "components/**/*.tsx"
  max_files: 20
  output: "test-results/component-structure.md"
  timeout: 5m
```

### Coordinación de subagentes

1. Subagente escribe resultado en archivo temporal
2. Agente principal lee y consolida
3. Archivos temporales se eliminan después

