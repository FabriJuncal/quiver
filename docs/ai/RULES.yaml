## workflow

### Flujo de trabajo estándar

```yaml
workflow:
  1_recibir_tarea: "Leer spec del slice"
  2_entender_contexto: "Leer docs/CONTEXTO.md si es necesario"
  3_planificar: "Crear plan si es requerido (ver planning)"
  4_implementar: "Seguir plan, paso por paso"
  5_testear: "Tests + evidencia"
  6_documentar: "Actualizar docs"
  7_crear_pr: "Seguir GITFLOW_PR_GUIDE.md"
  8_archivar: "PR documentado en specs/[spec]/slices/[slice-id]/pr.md"
```

### Comandos disponibles

```yaml
commands:
  "/plan": "Crear plan para tarea"
  "/review": "Review automático"
  "/techdebt": "Scan de deuda técnica"
  "/context": "Mostrar contexto actual"
  "/lessons": "Mostrar lessons learned"
```

