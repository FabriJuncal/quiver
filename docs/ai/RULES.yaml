## code_quality

### Estándares de código

```yaml
naming:
  variables: camelCase
  constants: UPPER_SNAKE_CASE
  files: kebab-case
  components: PascalCase

structure:
  max_lines_per_function: 50
  max_lines_per_file: 500
  max_parameters: 3
```

### Anti-patrones

```yaml
avoid:
  - console.log_en_produccion
  - any_type_en_typescript
  - comentarios_que_explican_que_hace_el_codigo
  - magic_numbers_sin_constante
  - funciones_con_mas_de_3_parametros
```

