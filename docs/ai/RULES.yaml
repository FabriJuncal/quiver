## testing

### Tests obligatorios

```yaml
required_tests:
  - e2e: "Para flujos completos (registro → dashboard)"
  - integration: "Para endpoints de API"
  - unit: "Para funciones complejas (cálculo de costos)"
```

### Evidencia de testing

```yaml
evidence:
  screenshots: "test-results/screenshots/"
  logs: "test-results/logs/"
  reports: "test-results/SLICE-XX-EVIDENCE-REPORT.md"
```

### Comandos de testing

```yaml
commands:
  test_e2e: "npm run test:e2e"
  test_e2e_ui: "npm run test:e2e:ui"
  test_e2e_report: "npm run test:e2e:report"
  lint: "npm run lint"
  type_check: "npx tsc --noEmit"
  build: "npm run build"
```

